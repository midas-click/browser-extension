<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Midas Click</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div class="brand">
          <img class="logo" src="logo.png" alt="Midas Click" />
          <div>
            <h1>MidasClick</h1>
          </div>
        </div>
        <span id="authBadge" class="badge muted">Checking</span>
      </header>

      <section id="signedOut" class="panel hidden">
        <p class="copy">Sign in with your Midas account to sync resumes and create applications.</p>
        <button id="signInBtn" class="primary">Sign in</button>
      </section>

      <section id="signedIn" class="workspace hidden">
        <section class="step-card">
          <div class="step-head">
            <span class="step-index">1</span>
            <div>
              <h2>Create job</h2>
              <p>Capture this page and save it to your board.</p>
            </div>
          </div>
          <button id="createJobBtn" class="primary">Create Job From Page</button>

          <div id="jobPreview" class="preview hidden">
            <p class="label">Created job</p>
            <p id="jobTitle" class="title"></p>
            <p id="jobMeta" class="muted-text"></p>
          </div>
        </section>

        <section class="step-card">
          <div class="step-head">
            <span class="step-index">2</span>
            <div>
              <h2>Create application</h2>
              <p>Choose the resume to attach to this job.</p>
            </div>
          </div>

          <div class="field-group">
            <div class="field-label-row">
              <p class="label">Resume</p>
              <button id="syncBtn" class="text-action" title="Sync resumes">Sync</button>
            </div>
            <div id="resumeDropdown" class="resume-dropdown">
              <button
                id="resumeDropdownBtn"
                class="resume-trigger"
                type="button"
                aria-haspopup="listbox"
                aria-expanded="false"
              >
                <span class="resume-trigger-text">
                  <span id="selectedResumeName" class="resume-name">No resumes synced</span>
                </span>
                <span class="resume-trigger-icon" aria-hidden="true"></span>
              </button>
              <div id="resumeOptions" class="resume-options hidden" role="listbox"></div>
            </div>
            <p id="matchStatus" class="match-status"></p>
          </div>

          <button id="createApplicationBtn" class="primary" disabled>Create Application</button>
        </section>

        <button id="signOutBtn" class="link-btn">Sign out</button>
      </section>

      <p id="status" class="status"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
